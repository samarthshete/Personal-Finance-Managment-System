name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: budgetflow_user
          POSTGRES_PASSWORD: budgetflow_password
          POSTGRES_DB: budgetflow_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U budgetflow_user -d budgetflow_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://budgetflow_user:budgetflow_password@localhost:5432/budgetflow_db
      SECRET_KEY: ci_test_secret_key
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: budgetflow-reports
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: true
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o-mini
      ADVISOR_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest -q
